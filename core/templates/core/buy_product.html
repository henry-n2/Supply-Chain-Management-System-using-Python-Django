{% extends 'core/base.html' %}
{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <img src="{{ retailer_stock.product.product.image.url }}" class="card-img-top" alt="{{ retailer_stock.product.product.name }}" style="max-height: 250px; object-fit: cover;">
                <div class="card-body">
                    <h4 class="card-title">{{ retailer_stock.product.product.name }}</h4>
                    <p>{{ retailer_stock.product.product.description }}</p>
                    <p class="h5">Price: ₹{{ retailer_stock.price }}</p>
                    <p class="text-muted">Available: {{ retailer_stock.available_quantity }}</p>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="transaction_id" class="form-label">Transaction ID</label>
                            <input type="text" class="form-control" id="transaction_id" name="transaction_id" required>
                        </div>
                        <div class="mb-3">
                            <label for="quantity" class="form-label">Quantity</label>
                            <input type="number" class="form-control" id="quantity" name="quantity" min="1" max="{{ retailer_stock.available_quantity }}" value="1" required>
                        </div>
                        <button type="submit" class="btn btn-success">Purchase</button>
                        <a href="{% url 'home' %}" class="btn btn-secondary">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
