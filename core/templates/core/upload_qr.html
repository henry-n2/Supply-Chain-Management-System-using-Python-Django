{% extends 'core/base.html' %}
{% block content %}
<div class="container mt-4">
  <h2>Upload Payment Gateway QR for {{ stock.product.product.name }}</h2>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.qr_image.label_tag }}<br>
    {{ form.qr_image }}<br>
    <button type="submit" class="btn btn-primary mt-2">Upload</button>
    <a href="{% url 'retailer_dashboard' %}" class="btn btn-secondary mt-2">Cancel</a>
  </form>
  {% if stock.qr_image %}
  <div class="mt-3">
    <strong>Current QR:</strong><br>
    <img src="{{ stock.qr_image.url }}" alt="QR" style="height: 120px;">
  </div>
  {% endif %}
</div>
{% endblock %}
