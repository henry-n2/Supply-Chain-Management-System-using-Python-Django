{% extends 'core/base.html' %}

{% block content %}
<div class="container mt-4">
    <h2>Edit Retailer Price for {{ stock.product.name }}</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Current Price: ₹{{ stock.price }}</label>
            <input type="number" name="price" class="form-control" step="0.01" value="{{ stock.price }}" required>
        </div>
        <button type="submit" class="btn btn-primary mt-3">Update Price</button>
        <a href="{% url 'distributor_dashboard' %}" class="btn btn-secondary mt-3">Cancel</a>
    </form>
</div>
{% endblock %}
