{% extends 'core/base.html' %}
{% block content %}
<div class="container mt-5">
    <h2>Confirm Stock Addition</h2>
    <div class="card mb-4">
        <div class="card-body">
            <h5 class="card-title">{{ manufacturer_product.name }}</h5>
            <p class="card-text">
                Quantity: {{ temp_data.quantity }}<br>
                Price: ₹{{ temp_data.price }}
            </p>
        </div>
    </div>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="transaction_id">Transaction ID</label>
            <input type="text" class="form-control" name="transaction_id" placeholder="Enter transaction ID" required>
        </div>
        <button type="submit" class="btn btn-primary">Confirm</button>
        <a href="{% url 'distributor_dashboard' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
